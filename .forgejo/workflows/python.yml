name: python

on:
  push:
    branches: [main]
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.forgejo/workflows/python.yml'
  pull_request:
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.forgejo/workflows/python.yml'

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: langs/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install ruff

      - name: Lint (ruff)
        working-directory: langs/python
        run: ruff check src tests

      - name: Test + coverage
        working-directory: langs/python
        run: pytest tests/ --cov=tiss_hash --cov-report=term -v
