name: python

on:
  push:
    branches: [main]
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.forgejo/workflows/python.yml'
  pull_request:
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.forgejo/workflows/python.yml'

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    # codeberg-small = runner global ATIVO (2 CPU/4GB/5min). NÃO usar "docker"
    # (mapeia pro runner individual "claudio" que fica offline).
    runs-on: codeberg-small
    container:
      # Default oficial atual do Codeberg (catthehacker/ubuntu, imagem do
      # nektos/act). Tem build deps de Python + git + curl + sudo, garantia
      # de compat com actions/setup-python e demais setup-*. node:*-bookworm
      # QUEBRA setup-python ("unable to obtain a proper python version" —
      # codeberg/community#1718). NÃO mexer sem motivo.
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: langs/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install ruff

      - name: Lint (ruff)
        working-directory: langs/python
        run: ruff check src tests

      # CVE gate (A-SUP2). Audita deps runtime (defusedxml). Roda em uma versão só.
      - name: pip-audit
        if: matrix.python-version == '3.12'
        working-directory: langs/python
        run: |
          pip install pip-audit
          pip-audit --skip-editable

      - name: Test + coverage
        working-directory: langs/python
        run: pytest tests/ --cov=tiss_hash --cov-report=term -v
