name: python

on:
  push:
    branches: [main]
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.forgejo/workflows/python.yml'
  pull_request:
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.forgejo/workflows/python.yml'

jobs:
  test:
    name: py${{ matrix.python-version }}
    # codeberg-small = runner global ativo no Codeberg (vs label "docker"
    # que mapeia pra runner individual e fica em fila se offline).
    runs-on: codeberg-small
    container:
      # node:20-bookworm tem git+curl+ca-certificates pre-instalados
      # (deps de actions/checkout); setup-python instala o Python da matriz.
      image: docker.io/library/node:20-bookworm
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: langs/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install ruff

      - name: Lint (ruff)
        working-directory: langs/python
        run: ruff check src tests

      - name: Test + coverage
        working-directory: langs/python
        run: pytest tests/ --cov=tiss_hash --cov-report=term -v
