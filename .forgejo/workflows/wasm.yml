name: wasm

on:
  push:
    branches: [main]
    paths:
      - 'langs/wasm/**'
      - 'langs/rust/**'
      - 'conformance/**'
      - '.forgejo/workflows/wasm.yml'
  pull_request:
    paths:
      - 'langs/wasm/**'
      - 'langs/rust/**'
      - 'conformance/**'
      - '.forgejo/workflows/wasm.yml'

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # DEVE casar com `wasm-bindgen = "=0.2.122"` do Cargo.toml.
  WASM_BINDGEN_VERSION: '0.2.122'

jobs:
  test:
    name: wasm32 + wasm-bindgen + node harness
    # codeberg-medium: rustup + cargo install wasm-bindgen-cli (compila do zero)
    # + build wasm + node estoura o budget de 5min do codeberg-small. O cache
    # de ~/.cargo/bin amortiza o install entre runs.
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # rustup via script oficial (igual rust.yml); + target wasm32.
      - name: Install Rust toolchain (stable + wasm32 target)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Cache cargo + wasm-bindgen
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            langs/wasm/target
            langs/rust/target
          key: wasm-${{ env.WASM_BINDGEN_VERSION }}-${{ hashFiles('langs/wasm/Cargo.lock') }}
          restore-keys: |
            wasm-${{ env.WASM_BINDGEN_VERSION }}-

      # wasm-bindgen-cli na versão pinada (= dep do Cargo.toml). Cache amortiza.
      - name: Install wasm-bindgen-cli ${{ env.WASM_BINDGEN_VERSION }}
        run: |
          set -euo pipefail
          if wasm-bindgen --version 2>/dev/null | grep -q "${WASM_BINDGEN_VERSION}"; then
            echo "wasm-bindgen ${WASM_BINDGEN_VERSION} já presente (cache)."
          else
            cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked --force
          fi

      # build.sh: cargo build --target wasm32 + wasm-bindgen (pkg/web e pkg/node).
      - name: Build (build.sh)
        working-directory: langs/wasm
        run: bash build.sh

      # npm test = node test/conformance.mjs: 20 vetores sintéticos.
      # Goldens reais são privados (fora do CI) → SKIP, não falha.
      - name: Test (node harness, 20 vetores)
        working-directory: langs/wasm
        run: npm test
