name: java

on:
  push:
    branches: [main]
    paths:
      - 'langs/java/**'
      - 'conformance/**'
      - '.forgejo/workflows/java.yml'
  pull_request:
    paths:
      - 'langs/java/**'
      - 'conformance/**'
      - '.forgejo/workflows/java.yml'

concurrency:
  group: java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: jdk${{ matrix.java-version }}
    runs-on: codeberg-small
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Install Maven
        # catthehacker/ubuntu:act-latest nao traz Maven; setup-java instala JDK
        # mas nao tooling de build. apt install eh idempotente.
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y --no-install-recommends maven

      - name: Lint (Checkstyle)
        working-directory: langs/java
        # A-CI3: falha o build em qualquer violacao (failOnViolation=true).
        run: mvn -B -ntp checkstyle:check

      - name: Test + cobertura (JaCoCo)
        working-directory: langs/java
        # `verify` roda surefire (testes) + jacoco:report. JaCoCo so mede
        # e gera target/site/jacoco/* (A-CI4: sem threshold falhando).
        run: mvn -B -ntp verify

      - name: Coverage summary (JaCoCo)
        if: matrix.java-version == '21'
        working-directory: langs/java
        # Resumo inline (Forgejo runner nao tem upload-artifact confiavel).
        # O CSV do JaCoCo e plano (sem XML/DTD): somar colunas LINE_MISSED
        # (col 8) e LINE_COVERED (col 9) com awk evita parser XML.
        run: |
          mvn -B -ntp jacoco:report -Djacoco.outputFormat=csv >/dev/null 2>&1 || true
          CSV=target/site/jacoco/jacoco.csv
          if [ -f "$CSV" ]; then
            awk -F, 'NR>1 {miss+=$8; cov+=$9}
              END {tot=miss+cov; pct=(tot? cov*100/tot : 0);
                   printf "JaCoCo line coverage: %d/%d (%.1f%%)\n", cov, tot, pct}' "$CSV"
          else
            echo "jacoco.csv ausente (relatorio HTML/XML em target/site/jacoco/)"
          fi

      - name: CVE watch (deps desatualizadas)
        working-directory: langs/java
        # A-SUP2 (alternativa leve): dependency-check baixa a base NVD inteira
        # + API key + 10-20min — inviavel pro porte da lib. versions plugin
        # sinaliza libs velhas (proxy de CVE). Informativo: nao falha o build.
        continue-on-error: true
        run: mvn -B -ntp versions:display-dependency-updates
