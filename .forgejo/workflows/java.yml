name: java

on:
  push:
    branches: [main]
    paths:
      - 'langs/java/**'
      - 'conformance/**'
      - '.forgejo/workflows/java.yml'
  pull_request:
    paths:
      - 'langs/java/**'
      - 'conformance/**'
      - '.forgejo/workflows/java.yml'

concurrency:
  group: java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: jdk${{ matrix.java-version }}
    runs-on: codeberg-small
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Install Maven
        # catthehacker/ubuntu:act-latest nao traz Maven; setup-java instala JDK
        # mas nao tooling de build. apt install eh idempotente.
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y --no-install-recommends maven

      - name: Test
        working-directory: langs/java
        run: mvn -B -ntp test
