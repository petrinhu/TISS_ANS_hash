name: cpp

on:
  push:
    branches: [main]
    paths:
      - 'langs/cpp/**'
      - 'conformance/**'
      - '.forgejo/workflows/cpp.yml'
  pull_request:
    paths:
      - 'langs/cpp/**'
      - 'conformance/**'
      - '.forgejo/workflows/cpp.yml'

concurrency:
  group: cpp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: g++-13 ${{ matrix.build-type }}
    # codeberg-medium: C++20 + build de pugixml + ctest (+ sanitizers) > 5min.
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: false
      matrix:
        # clang dropado no Codeberg: libclang-rt do catthehacker/ubuntu:act-latest
        # nao bate com -fsanitize=address,undefined (mesma decisao do c.yml).
        # Matrix com clang fica no .github/workflows/cpp.yml (ubuntu-latest).
        # Debug = ASan+UBSan; Release = build otimizado de corretude.
        build-type: [Debug, Release]
    env:
      CXX: g++-13
      CC: gcc-13
      ASAN_OPTIONS: "detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (gcc-13 pra C++20) + deps (pugixml, openssl)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          # gcc-13 nao esta no Ubuntu 22.04 default; ubuntu-toolchain-r PPA fornece.
          apt-get install -y --no-install-recommends software-properties-common
          add-apt-repository -y ppa:ubuntu-toolchain-r/test
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake ninja-build python3 \
            gcc-13 g++-13 \
            libpugixml-dev libssl-dev pkg-config

      - name: Configure (with ASan + UBSan no Debug)
        working-directory: langs/cpp
        run: |
          if [ "${{ matrix.build-type }}" = "Debug" ]; then
            cmake -GNinja -B build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          else
            cmake -GNinja -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        working-directory: langs/cpp
        run: cmake --build build --parallel

      - name: Test
        working-directory: langs/cpp
        run: ctest --test-dir build --output-on-failure

  lint:
    name: clang-tidy
    runs-on: codeberg-small
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install clang-tidy + deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake ninja-build clang clang-tidy libpugixml-dev libssl-dev pkg-config
      - name: Configure (export compile commands)
        working-directory: langs/cpp
        env:
          CC: clang
          CXX: clang++
        run: cmake -GNinja -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: clang-tidy (config em langs/cpp/.clang-tidy)
        working-directory: langs/cpp
        run: clang-tidy -p build src/tiss_hash.cpp
