name: rust

on:
  push:
    branches: [main]
    paths:
      - 'langs/rust/**'
      - 'conformance/**'
      - '.forgejo/workflows/rust.yml'
  pull_request:
    paths:
      - 'langs/rust/**'
      - 'conformance/**'
      - '.forgejo/workflows/rust.yml'

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test + clippy + fmt
    # codeberg-medium: cargo+rustup+compile excede o timeout de 5min de tiny/small.
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal \
              --component clippy,rustfmt
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            langs/rust/target
          key: cargo-${{ hashFiles('langs/rust/Cargo.lock') }}
          restore-keys: cargo-

      - name: fmt
        working-directory: langs/rust
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: langs/rust
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: langs/rust
        run: cargo test --all-targets --verbose

      # CVE gate (A-SUP2). cargo-audit varre Cargo.lock contra RustSec advisory-db.
      - name: cargo audit
        working-directory: langs/rust
        run: |
          cargo install cargo-audit --locked
          cargo audit

      # Coverage (A-CI4). Só mede/reporta — sem threshold que falhe.
      # cargo-mutants (A-QA1) NÃO roda aqui: é muito lento p/ o runner Codeberg.
      # Mutation fica no .github (job manual via workflow_dispatch).
      - name: cargo tarpaulin (coverage)
        working-directory: langs/rust
        run: |
          cargo install cargo-tarpaulin --locked
          cargo tarpaulin --out Stdout --skip-clean
