name: rust

on:
  push:
    branches: [main]
    paths:
      - 'langs/rust/**'
      - 'conformance/**'
      - '.forgejo/workflows/rust.yml'
  pull_request:
    paths:
      - 'langs/rust/**'
      - 'conformance/**'
      - '.forgejo/workflows/rust.yml'

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test + clippy + fmt
    # codeberg-medium: cargo+rustup+compile excede o timeout de 5min de tiny/small.
    runs-on: codeberg-medium
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal \
              --component clippy,rustfmt
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            langs/rust/target
          key: cargo-${{ hashFiles('langs/rust/Cargo.lock') }}
          restore-keys: cargo-

      - name: fmt
        working-directory: langs/rust
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: langs/rust
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: langs/rust
        run: cargo test --all-targets --verbose

      # NOTA: cargo-audit (CVE, A-SUP2), cargo-tarpaulin (coverage, A-CI4) e
      # cargo-mutants (A-QA1) NÃO rodam no Codeberg. Cada `cargo install` compila
      # um binário grande do zero (~5-8min cada) e estoura o budget do runner
      # codeberg-medium (run cancelado em 10m01s no push d2d658b/697cb18).
      # Esses gates rodam no .github/workflows/rust.yml (ubuntu-latest, sem aperto
      # de tempo). O Codeberg mantém o que importa pra paridade: fmt+clippy+test
      # (conformance byte-a-byte). Ver TODO A-SUP2/A-CI4/A-QA1.
