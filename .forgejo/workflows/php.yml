name: php

on:
  push:
    branches: [main]
    paths:
      - 'langs/php/**'
      - 'conformance/**'
      - '.forgejo/workflows/php.yml'
  pull_request:
    paths:
      - 'langs/php/**'
      - 'conformance/**'
      - '.forgejo/workflows/php.yml'

concurrency:
  group: php-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: php${{ matrix.php }}
    runs-on: codeberg-small
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        # shivammathur/setup-php nao esta mirrored em data.forgejo.org —
        # uso prefixo explicito https://github.com/.
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, dom, libxml
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-php${{ matrix.php }}-${{ hashFiles('langs/php/composer.json') }}
          restore-keys: composer-php${{ matrix.php }}-

      - name: Install
        working-directory: langs/php
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Static analysis (PHPStan level 6)
        working-directory: langs/php
        run: composer stan

      - name: Test
        working-directory: langs/php
        run: composer test

      - name: Audit deps (CVE gate)
        working-directory: langs/php
        run: composer audit

      # NOTA: cobertura PHP NAO roda aqui. Exige driver pcov/xdebug, que o
      # runner Codeberg/Forgejo (setup-php com `coverage: none`) nao garante.
      # Coverage vive so no .github/workflows/php.yml (job `coverage`, pcov).
      # Report only, sem threshold — gate fragil de cobertura e pior que nada.
