name: cpp

on:
  push:
    branches: [main]
    paths:
      - 'langs/cpp/**'
      - 'conformance/**'
      - '.github/workflows/cpp.yml'
  pull_request:
    paths:
      - 'langs/cpp/**'
      - 'conformance/**'
      - '.github/workflows/cpp.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: g++-13 ${{ matrix.build-type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug]
    env:
      CXX: g++-13
      CC: gcc-13
    steps:
      - uses: actions/checkout@v4
      - name: Install gcc-13 + pugixml + openssl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build python3 \
            gcc-13 g++-13 \
            libpugixml-dev libssl-dev pkg-config
      - working-directory: langs/cpp
        run: cmake -GNinja -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
      - working-directory: langs/cpp
        run: cmake --build build --parallel
      - working-directory: langs/cpp
        run: ctest --test-dir build --output-on-failure
