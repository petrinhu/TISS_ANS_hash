# Release multi-linguagem (port Python -> PyPI; GitHub Release com TODOS os ports).
#
# Dispara SÓ quando uma tag `v*` é empurrada (ou manualmente via
# workflow_dispatch para um dry-run que NÃO publica no PyPI nem cria Release —
# ver guarda `if:` nos jobs pypi-publish e github-release). Tudo abaixo é inerte
# até a tag existir.
#
# Pipeline:
#   build (py sdist+wheel)          -> pypi-publish (gated, OIDC)
#   multilang-assets (9 ports)      \
#   build (py sdist+wheel)          /-> github-release (Release da tag, assets de todas as langs)
#
# GATE DE PUBLISH (vars.PYPI_ENABLED):
#  - O job `pypi-publish` so roda quando a VARIAVEL de repo PYPI_ENABLED=true.
#    Sem ela, o job e SKIPPED (verde) e NADA vai pro PyPI — mas o job
#    `github-release` cria o Release do GitHub normal. `github-release` depende
#    de `build` (py) + `multilang-assets`, NUNCA de `pypi-publish`.
#    Assim uma tag v* HOJE produz Release sem exigir conta/OIDC no PyPI.
#
# RESILIENCIA DOS BUILDS MULTI-LINGUAGEM:
#  - Cada build de linguagem em `multilang-assets` e `continue-on-error: true`:
#    um port flaky NAO bloqueia o Release. Anexa-se o que efetivamente saiu em
#    `release-assets/`. (O Python canonico vem do job `build`, NAO daqui.)
#
# SEGURANCA / SUPPLY CHAIN:
#  - Trusted Publishing (OIDC): sem token/senha no repo. O PyPI confia neste
#    workflow via "pending publisher" configurado no projeto. Requer o
#    environment `pypi`.
#  - Todas as actions de terceiros estao PINADAS por SHA completo (nao por
#    tag movel). O comentario `# vX.Y.Z` ao lado de cada SHA e so para leitura
#    humana; o que o runner usa e o SHA. Todos os SHAs ja eram usados nos
#    workflows de CI/release deste repo (reutilizados, nada novo introduzido).
#  - O artefato Python que vai pro PyPI e o mesmo (job `build`) reutilizado pelo
#    Release, garantindo paridade bit-a-bit no port canonico.
name: release-python

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default minimo; cada job eleva so o que precisa.
permissions:
  contents: read

concurrency:
  group: release-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build (sdist + wheel)
        working-directory: langs/python
        run: python -m build

      # twine check valida os metadados do PyPI antes de qualquer publish.
      # Falha o release cedo se o long_description / classifiers quebrarem.
      - name: Validate metadata (twine check)
        working-directory: langs/python
        run: |
          pip install twine
          python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-dist
          path: langs/python/dist/
          if-no-files-found: error
          retention-days: 7

  multilang-assets:
    name: build assets de todas as linguagens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Precisamos da tag/historico para `git archive` da source tarball.
          fetch-depth: 0

      - name: Prepare release-assets dir
        run: mkdir -p release-assets

      # --- Toolchains (pinadas por SHA, reutilizadas do CI deste repo) ---
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET (8)
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: '8.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: stable

      - name: Install C build deps (libxml2, openssl)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libxml2-dev libssl-dev

      # --- Builds por linguagem. Cada um continue-on-error: um port flaky NAO
      #     derruba o Release; anexa-se o que saiu. ---

      # node: tarball npm (.tgz). --pack-destination joga direto em release-assets/.
      - name: Build node (.tgz)
        continue-on-error: true
        working-directory: langs/node
        run: |
          npm pack --pack-destination "$GITHUB_WORKSPACE/release-assets"
          ls -l "$GITHUB_WORKSPACE/release-assets"

      # rust: crate empacotado (.crate). --no-verify evita rebuild custoso.
      - name: Build rust (.crate)
        continue-on-error: true
        working-directory: langs/rust
        run: |
          cargo package --no-verify --locked
          cp target/package/*.crate "$GITHUB_WORKSPACE/release-assets/"

      # java: .jar em target/. -DskipTests pra empacotar rapido sem rodar suite.
      - name: Build java (.jar)
        continue-on-error: true
        working-directory: langs/java
        run: |
          mvn -q -ntp -DskipTests package
          cp target/*.jar "$GITHUB_WORKSPACE/release-assets/"

      # csharp: .nupkg do projeto da lib (src, nunca tests).
      - name: Build csharp (.nupkg)
        continue-on-error: true
        working-directory: langs/csharp
        run: |
          dotnet pack src/TissHash/TissHash.csproj -c Release \
            -o "$GITHUB_WORKSPACE/release-assets"

      # c: lib estatica (.a) + dinamica (.so). Makefile usa pkg-config.
      - name: Build c (.a + .so)
        continue-on-error: true
        working-directory: langs/c
        run: |
          make
          cp build/libtiss_hash.a "$GITHUB_WORKSPACE/release-assets/"
          # Copia a .so (e variantes versionadas, se existirem).
          cp build/libtiss_hash.so* "$GITHUB_WORKSPACE/release-assets/" || true

      # kotlin: .jar da lib via build.sh jar (kotlinc puro, sem Gradle). Sob o
      # JDK Temurin 17 ja instalado (Setup Java acima), o kotlinc 2.1.0 compila
      # normalmente — o build.sh resolve JAVA_HOME e extrai as classes do JDK.
      # Baixa kotlinc 2.1.0 (zip oficial) e empacota build/tiss-hash-kotlin-*.jar.
      - name: Build kotlin (.jar)
        continue-on-error: true
        env:
          KOTLIN_VERSION: '2.1.0'
        run: |
          set -euo pipefail
          KDIR="$HOME/.kotlin-compiler"
          if [ ! -x "$KDIR/kotlinc/bin/kotlinc" ]; then
            mkdir -p "$KDIR"
            URL="https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
            curl -fsSL -o /tmp/kotlin-compiler.zip "$URL"
            unzip -q /tmp/kotlin-compiler.zip -d "$KDIR"
          fi
          export PATH="$KDIR/kotlin/bin:$PATH"
          cd langs/kotlin
          bash build.sh jar
          cp build/tiss-hash-kotlin-*.jar "$GITHUB_WORKSPACE/release-assets/"

      # wasm: tarball npm (.tgz) com pkg/web + pkg/node (bindings wasm-bindgen).
      # Reusa Rust stable (Setup Rust acima); adiciona o target wasm32 e a CLI
      # wasm-bindgen na versao pinada (= dep do Cargo.toml). build.sh gera pkg/;
      # npm pack empacota conforme o campo "files" do package.json.
      - name: Build wasm (.tgz)
        continue-on-error: true
        env:
          WASM_BINDGEN_VERSION: '0.2.122'
        run: |
          set -euo pipefail
          rustup target add wasm32-unknown-unknown
          if ! wasm-bindgen --version 2>/dev/null | grep -q "${WASM_BINDGEN_VERSION}"; then
            cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked --force
          fi
          cd langs/wasm
          bash build.sh
          npm pack --pack-destination "$GITHUB_WORKSPACE/release-assets"

      # source tarball reproduzivel a partir da REF DA TAG (git archive).
      # cpp/go/php sao source-only: a tarball ja os carrega inteiros.
      - name: Build source tarball (.tar.gz)
        continue-on-error: true
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          git archive --format=tar.gz \
            --prefix="TISS_ANS_hash-${VER}/" \
            "$TAG" \
            -o "release-assets/TISS_ANS_hash-${VER}-source.tar.gz"

      - name: List collected assets
        run: ls -l release-assets

      - name: Upload multilang assets artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: multilang-assets
          path: release-assets/
          # Em workflow_dispatch (sem tag) a source-tarball usa github.ref_name
          # que ainda pode resolver; mas se nada sair nao queremos travar o
          # dry-run de build. `warn` em vez de `error`.
          if-no-files-found: warn
          retention-days: 7

  pypi-publish:
    name: publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    # GATE (vars.PYPI_ENABLED): enquanto o lider nao setar a variavel de repo
    # PYPI_ENABLED=true, este job e SKIPPED (verde, nao falha) e NADA vai pro
    # PyPI. O job `github-release` abaixo depende de `build` + `multilang-assets`,
    # entao o Release do GitHub continua sendo criado normalmente mesmo com o
    # publish desligado. SO publica em push de tag. workflow_dispatch nao publica.
    if: vars.PYPI_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # O environment `pypi` deve existir no repo e bater com o pending publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/tiss-hash/
    permissions:
      # OIDC: o unico privilegio necessario. Sem contents/packages.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: python-dist
          path: dist/

      # Trusted Publishing: sem `password`. A action troca o token OIDC do
      # GitHub por uma credencial efemera junto ao PyPI. `packages-dir`
      # default e `dist/`, que e exatamente onde baixamos o artifact.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true

  github-release:
    name: GitHub Release (todas as langs + checksums + SBOM)
    needs: [build, multilang-assets]
    runs-on: ubuntu-latest
    # GitHub Release so faz sentido com uma tag. Pula em workflow_dispatch.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      # Necessario para criar o Release e anexar assets.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Python canonico (bit-a-bit o mesmo que iria pro PyPI).
      - name: Download python dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: python-dist
          path: release-assets/

      # Assets das demais linguagens + source tarball.
      - name: Download multilang assets
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: multilang-assets
          path: release-assets/

      # Checksums sobre TODOS os assets coletados. Nomes relativos (cd) para o
      # SHA256SUMS conter so o basename, facilitando `sha256sum -c`.
      - name: Generate SHA256SUMS
        working-directory: release-assets
        run: |
          set -euo pipefail
          # Exclui o proprio SHA256SUMS/SBOM caso re-run deixe residuo.
          find . -maxdepth 1 -type f \
            ! -name 'SHA256SUMS' ! -name 'sbom.cdx.json' -printf '%P\n' \
            | sort | xargs -r sha256sum > SHA256SUMS
          cat SHA256SUMS

      # SBOM CycloneDX via syft sobre o REPO inteiro (cobre todos os ports e
      # suas deps declaradas), nao so o port Python. Saida JSON CycloneDX.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: release-assets/sbom.cdx.json
          # Nao deixar a action criar seu proprio Release; nos controlamos isso.
          upload-release-assets: false
          upload-artifact: false

      # Corpo do release: usa RELEASE_NOTES.md da raiz se existir; senao deixa
      # o action-gh-release auto-gerar a partir dos commits.
      - name: Resolve release body
        id: body
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "Using RELEASE_NOTES.md as release body"
            echo "use_file=true"  >> "$GITHUB_OUTPUT"
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_NOTES.md absent; falling back to auto-generated notes"
            echo "use_file=false" >> "$GITHUB_OUTPUT"
            echo "generate=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Em push de tag, a action usa github.ref_name como tag/name por default.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ steps.body.outputs.use_file == 'true' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ steps.body.outputs.generate == 'true' }}
          # NAO falhar se um glob nao casar: builds multi-lang sao
          # continue-on-error, entao um asset pode legitimamente faltar.
          fail_on_unmatched_files: false
          files: |
            release-assets/*
