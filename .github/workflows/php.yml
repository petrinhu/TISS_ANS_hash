name: php

on:
  push:
    branches: [main]
    paths:
      - 'langs/php/**'
      - 'conformance/**'
      - '.github/workflows/php.yml'
  pull_request:
    paths:
      - 'langs/php/**'
      - 'conformance/**'
      - '.github/workflows/php.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: php-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: php${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, dom, libxml
          coverage: none
      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-php${{ matrix.php }}-${{ hashFiles('langs/php/composer.json') }}
          restore-keys: composer-php${{ matrix.php }}-
      - working-directory: langs/php
        run: composer install --prefer-dist --no-interaction --no-progress
      - working-directory: langs/php
        run: composer test
