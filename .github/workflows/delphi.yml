name: delphi

on:
  push:
    branches: [main]
    paths:
      - 'langs/delphi/**'
      - 'conformance/**'
      - '.github/workflows/delphi.yml'
  pull_request:
    paths:
      - 'langs/delphi/**'
      - 'conformance/**'
      - '.github/workflows/delphi.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: delphi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fpc (modo delphi)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # fpc = Free Pascal Compiler (apt). Traz o fcl-json (fpjson/jsonparser)
      # que o conformance_test usa para ler vectors.json. -Mdelphi (no Makefile)
      # compila o port em modo de compatibilidade Delphi.
      - name: Install Free Pascal (fpc)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fpc

      - name: Version
        run: fpc -iV

      # make test: compila lib + conformance_test e roda os 20 vetores
      # (CONF_DIR=../../conformance). Os goldens (make goldens) são privados →
      # NÃO rodam no CI.
      - name: Build + conformance (20 vetores)
        working-directory: langs/delphi
        run: make test
