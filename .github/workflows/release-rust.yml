# Publish do port Rust (langs/rust, crate `tiss-hash` em crates.io).
#
# GATE (vars.CRATES_ENABLED): o `cargo publish --dry-run` roda SEMPRE (valida o
# empacotamento sem enviar nada). O publish REAL so roda quando o lider setar a
# Var de repo CRATES_ENABLED=true. Sem ela, o step de publish e SKIPPED (verde,
# nao falha) e NADA vai pro crates.io. Para ligar: criar a Var CRATES_ENABLED=
# true e o Secret CARGO_REGISTRY_TOKEN (token de API do crates.io). Ver
# docs/RELEASING.md.
#
# SEGURANCA / SUPPLY CHAIN:
#  - Token via secret CARGO_REGISTRY_TOKEN, lido pelo cargo como env oficial.
#    Nao entra em `run:` por interpolacao.
#  - Cargo.lock commitado => build reproduzivel (--locked).
#  - Actions PINADAS por SHA (comentario `# vX.Y.Z` e so leitura humana).
#  - `permissions` minimas (contents: read).
name: release-rust

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-rust-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crates-publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: stable

      - name: Test (gate antes de publicar)
        working-directory: langs/rust
        run: cargo test --locked

      # Dry-run SEMPRE: valida empacotamento/metadata sem enviar nada ao
      # crates.io. Roda inclusive em workflow_dispatch e com o gate desligado.
      - name: cargo publish --dry-run (sempre)
        working-directory: langs/rust
        run: cargo publish --locked --dry-run

      # Publish REAL: so com a Var CRATES_ENABLED=true E em push de tag.
      # Sem o gate, este step e SKIPPED (verde) e nada vai pro registry.
      - name: cargo publish (gated)
        if: vars.CRATES_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        working-directory: langs/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
