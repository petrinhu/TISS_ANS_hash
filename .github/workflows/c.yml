name: c

on:
  push:
    branches: [main]
    paths:
      - 'langs/c/**'
      - 'conformance/**'
      - '.github/workflows/c.yml'
  pull_request:
    paths:
      - 'langs/c/**'
      - 'conformance/**'
      - '.github/workflows/c.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.compiler }} ${{ matrix.build-type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build-type: [Debug]
    env:
      CC: ${{ matrix.compiler }}
      ASAN_OPTIONS: "detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build python3 ${{ matrix.compiler }} \
            libxml2-dev libssl-dev pkg-config
      - name: Configure (with ASan + UBSan)
        working-directory: langs/c
        run: |
          cmake -GNinja -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - working-directory: langs/c
        run: cmake --build build --parallel
      - working-directory: langs/c
        run: ctest --test-dir build --output-on-failure
