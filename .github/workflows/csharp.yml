name: csharp

on:
  push:
    branches: [main]
    paths:
      - 'langs/csharp/**'
      - 'conformance/**'
      - '.github/workflows/csharp.yml'
  pull_request:
    paths:
      - 'langs/csharp/**'
      - 'conformance/**'
      - '.github/workflows/csharp.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: csharp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: dotnet${{ matrix.dotnet-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ['8.0.x']
    defaults:
      run:
        working-directory: langs/csharp
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore

      - name: Lint (dotnet format)
        # A-CI3: falha se houver qualquer arquivo fora do .editorconfig.
        run: dotnet format --verify-no-changes --no-restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: CVE gate (vulnerable packages)
        # A-SUP2: lista pacotes (inclusive transitivos) com CVE conhecido e
        # FALHA o job se encontrar algum. dotnet imprime a linha literal
        # "has the following vulnerable packages" so quando acha vuln.
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -qi "has the following vulnerable packages" vuln.txt; then
            echo "::error::pacote(s) vulneravel(eis) detectado(s)"
            exit 1
          fi

      - name: Test + cobertura (coverlet)
        # A-CI4: coletor XPlat Code Coverage gera coverage.cobertura.xml.
        # Sem threshold falhando: so medir/reportar.
        run: >
          dotnet test -c Release --no-build
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload cobertura (Cobertura XML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-csharp
          path: langs/csharp/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
