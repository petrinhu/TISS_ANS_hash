name: go

on:
  push:
    branches: [main]
    paths:
      - 'langs/go/**'
      - 'conformance/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'langs/go/**'
      - 'conformance/**'
      - '.github/workflows/go.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']
    defaults:
      run:
        working-directory: langs/go
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: langs/go/go.sum

      - name: Vet + fmt
        run: |
          go vet ./...
          test -z "$(gofmt -l .)"

      - name: Test + coverage
        run: go test -v -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      # CVE gate (A-SUP2). govulncheck só reporta vuln que toca código alcançável.
      # Roda só na maior versão da matrix pra economizar (binário usa toolchain atual).
      - name: govulncheck
        if: matrix.go-version == '1.23'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
