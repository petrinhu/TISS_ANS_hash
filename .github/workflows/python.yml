name: python

on:
  push:
    branches: [main]
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'langs/python/**'
      - 'conformance/**'
      - '.github/workflows/python.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: langs/python/pyproject.toml

      - name: Install
        working-directory: langs/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install ruff

      - name: Lint (ruff)
        working-directory: langs/python
        run: ruff check src tests

      # CVE gate (A-SUP2). Audita as deps runtime (defusedxml). Roda em uma
      # versão só pra economizar; --skip-editable ignora a própria lib local.
      - name: pip-audit
        if: matrix.python-version == '3.12'
        working-directory: langs/python
        run: |
          pip install pip-audit
          pip-audit --skip-editable

      - name: Test + coverage
        working-directory: langs/python
        run: pytest tests/ --cov=tiss_hash --cov-report=xml --cov-report=term -v

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: langs/python/coverage.xml
          retention-days: 14
