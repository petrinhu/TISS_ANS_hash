# FUNDING.yml
# Habilita o botão "Sponsor" no GitHub.
# Documentação: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository
#
# Canal de patrocínio = GitHub Sponsors (o mais usado em repos GitHub).
# NOTA: o botão só renderiza se a conta `petrinhu` estiver inscrita/aprovada
# no GitHub Sponsors (github.com/sponsors). Se ainda não estiver, inscrever
# lá; ou trocar por um canal sem enrollment abaixo.
github: [petrinhu]
#
# Alternativas (descomentar a que tiver conta):
# open_collective: tiss-ans-hash
# liberapay: petrinhu
# ko_fi: petrinhu
# custom: ["https://example.com/donate"]
